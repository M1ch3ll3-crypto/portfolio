<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGPA Calculator — Michelle Oluyemi</title>
  <style>
    body{background:#1a0f2a;color:#e8d4ff;font-family:system-ui,sans-serif;margin:0;padding:20px;line-height:1.6}
   .wrap{max-width:560px;margin:auto}
    h1{color:#e9b8ff;text-align:center}
   .card{background:#221335;border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:20px;margin-bottom:18px}
    label{display:block;color:#f5d6ff;font-weight:600;margin:14px 0 6px}
    input,select{width:100%;box-sizing:border-box;background:#1a0f2a;border:1px solid rgba(168,85,247,.35);color:#e8d4ff;border-radius:12px;padding:12px;font-size:1rem}
   .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
   .btn{width:100%;background:linear-gradient(90deg,#a855f7,#e879f9);color:#fff;border:none;border-radius:999px;padding:14px;font-size:1rem;font-weight:700;margin-top:14px;cursor:pointer}
   .result{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;border-radius:12px;padding:16px;margin-top:16px;text-align:center;font-size:1.2rem;display:none}
   .back{display:inline-block;color:#f0b8ff;margin-top:20px;text-decoration:none;border:1px solid rgba(168,85,247,.35);padding:10px 16px;border-radius:999px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CGPA Calculator</h1>
    <div class="card">
      <form id="cgpaForm">
        <div id="courses">
          <div class="row">
            <input type="text" placeholder="Course Code" class="code" required>
            <input type="number" placeholder="Units" class="units" min="1" max="6" required>
            <select class="grade" required>
              <option value="">Grade</option>
              <option value="5">A</option><option value="4">B</option><option value="3">C</option>
              <option value="2">D</option><option value="1">E</option><option value="0">F</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn" onclick="addCourse()" style="background:#2d1a45;margin-top:0">+ Add Course</button>
        <button type="submit" class="btn">Calculate GPA</button>
      </form>
      <div class="result" id="result"></div>
    </div>
    <a href="projects.html" class="back">← Back to Projects</a>
  </div>

<script>
function addCourse() {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <input type="text" placeholder="Course Code" class="code" required>
    <input type="number" placeholder="Units" class="units" min="1" max="6" required>
    <select class="grade" required>
      <option value="">Grade</option>
      <option value="5">A</option><option value="4">B</option><option value="3">C</option>
      <option value="2">D</option><option value="1">E</option><option value="0">F</option>
    </select>
  `;
  document.getElementById('courses').appendChild(div);
}

document.getElementById('cgpaForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const units = document.querySelectorAll('.units');
  const grades = document.querySelectorAll('.grade');
  let totalUnits = 0, totalPoints = 0;

  for (let i = 0; i < units.length; i++) {
    const u = parseFloat(units[i].value);
    const g = parseFloat(grades[i].value);
    totalUnits += u;
    totalPoints += u * g;
  }

  const gpa = (totalPoints / totalUnits).toFixed(2);
  const res = document.getElementById('result');
  res.style.display = 'block';
  res.innerHTML = `Your GPA: <strong>${gpa}</strong> / 5.00`;
});
</script>
</body>
</html>
